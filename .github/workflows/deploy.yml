name: Deploy

# Generic SSH deploy to ANY Ubuntu host with Docker. The host is never named in
# the repo: it comes from secrets, so switching provider (Oracle, Hetzner, EC2,
# a home box behind a tunnel) is a secrets change, not a code change.
#
# Required secrets:
#   DEPLOY_HOST      IP or hostname of the target
#   DEPLOY_USER      SSH user (must be in the docker group)
#   DEPLOY_SSH_KEY   private key (PEM) for that user
#   DEPLOY_DOMAIN    public domain served by Caddy (health gate target)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose files and edge config
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml docker-compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/argus/"
          scp -i ~/.ssh/deploy_key -r infra \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/argus/"

      - name: Pull and restart
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ~/argus && IMAGE_TAG='${{ inputs.image_tag }}' \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && \
             IMAGE_TAG='${{ inputs.image_tag }}' \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans"

      - name: Health gate
        run: |
          domain="${{ secrets.DEPLOY_DOMAIN }}"
          # Fall back to the raw host if DNS/TLS isn't set up yet.
          url="https://${domain}/health"
          if [ -z "$domain" ]; then url="http://${{ secrets.DEPLOY_HOST }}:8000/health"; fi
          echo "Gating on $url"
          for i in $(seq 1 24); do
            code=$(curl -ks -o /dev/null -w '%{http_code}' "$url" || true)
            if [ "$code" = "200" ]; then echo "Healthy."; exit 0; fi
            echo "Attempt $i/24: HTTP $code; retrying in 5s"
            sleep 5
          done
          echo "Deploy failed the health gate." >&2
          exit 1
