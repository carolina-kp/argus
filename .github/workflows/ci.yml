name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: mypy argus_core
      - run: pytest

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ../core
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ../core
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install cfn-lint
      - run: cfn-lint infra/cloudformation.yaml
      - run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck infra/*.sh infra/backup/*.sh
